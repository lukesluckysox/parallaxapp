<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#0a0f1e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Parallax" />
    <meta name="description" content="See yourself from every angle" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>Parallax</title>
    <style>html,body{background:#0d1117;margin:0}</style>
  </head>
  <body>
    <div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;width:100vw;background:#0d1117"><svg width="80" height="80" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="46" stroke="#FFD166" stroke-width="2" stroke-dasharray="0 0 145 145" stroke-linecap="round" opacity="0.5"/><circle cx="50" cy="50" r="46" stroke="#FFD166" stroke-width="2" stroke-dasharray="6 10" stroke-linecap="round" opacity="0.25" transform="rotate(180 50 50)"/><circle cx="50" cy="50" r="40" stroke="#FFD166" stroke-width="0.5" opacity="0.12"/><circle cx="50" cy="4" r="3" fill="#FFD166" opacity="0.7"/><line x1="50" y1="14" x2="50" y2="4" stroke="#FFD166" stroke-width="2" stroke-linecap="round" opacity="0.9"/><style>@keyframes lumen-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18);opacity:1}}</style><circle cx="50" cy="50" r="34" fill="none" stroke="#FFD166" stroke-width="0.5" opacity="0.15" style="transform-origin:50px 50px;animation:lumen-pulse 3s ease-in-out infinite"/><circle cx="50" cy="50" r="22" fill="none" stroke="#FFD166" stroke-width="0.8" opacity="0.25" style="transform-origin:50px 50px;animation:lumen-pulse 3s ease-in-out 0.3s infinite"/><circle cx="50" cy="50" r="12" fill="#FFD166" opacity="0.9" style="transform-origin:50px 50px;animation:lumen-pulse 3s ease-in-out 0.6s infinite"/></svg></div></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
